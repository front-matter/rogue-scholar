class CitationsCF(BaseListCF):
    """Citations with identifier, scheme and reference."""

    def __init__(self, name, **kwargs):
        """Constructor."""
        super().__init__(
            name,
            field_cls=fields.Nested,
            field_args=dict(
                nested=dict(
                    identifier=SanitizedUnicode(),
                    scheme=SanitizedUnicode(),
                    reference=SanitizedUnicode(),
                )
            ),
            multiple=True,
            **kwargs,
        )

    @property
    def mapping(self):
        """Return the mapping."""
        return {
            "properties": {
                "identifier": {
                    "type": "text",
                    "fields": {"keyword": {"type": "keyword"}},
                },
                "scheme": {"type": "keyword"},
                "reference": {"type": "text"},
            }
        }


class CommunityVocabularyCF(VocabularyCF):
    """Vocabulary field with mapping matching dereferenced community payloads."""

    @property
    def mapping(self):
        """Return the mapping."""
        _mapping = super().mapping
        _mapping["properties"].update(
            {
                "props": {"type": "object", "dynamic": "true"},
                "icon": {"type": "keyword"},
            }
        )
        return _mapping


