# Monkey-patch invenio_stats.bookmark.format_range_dt to strip timezone info
# before calling isoformat(). This fixes a bug in invenio-stats 6.0.0 where
# timezone-aware datetimes produce "+00:00" suffixes that OpenSearch rejects
# with format "strict_date_hour_minute_second".
# See: https://github.com/inveniosoftware/invenio-stats/issues/XXX
import invenio_stats.bookmark as _bookmark
import invenio_stats.aggregations as _aggregations

_original_format_range_dt = _bookmark.format_range_dt


def _patched_format_range_dt(dt, interval):
    if (
        not isinstance(dt, str)
        and hasattr(dt, "tzinfo")
        and dt.tzinfo is not None
    ):
        dt = dt.replace(tzinfo=None)
    return _original_format_range_dt(dt, interval)


_bookmark.format_range_dt = _patched_format_range_dt
_aggregations.format_range_dt = _patched_format_range_dt
