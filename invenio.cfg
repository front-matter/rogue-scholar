# Redis/Valkey configuration
# ==========================
# Simplify configuration by using a single base Redis URL and assigning
# different database numbers for different purposes, auto-incrementing
# for each service. Consolidate into five databases:
# 0: accounts session store
# 1: Celery broker
# 2: Celery result backend
# 3: Ratelimit storage
# 4: Cache

_redis_url = os.environ.get(
    "INVENIO_ACCOUNTS_SESSION_REDIS_URL", "redis://cache:6379/0"
)
# Extract base URL and database number
if "/" in _redis_url:
    _redis_base, _redis_db_str = _redis_url.rsplit("/", 1)
    try:
        _redis_db = int(_redis_db_str)
    except ValueError:
        _redis_db = 0
        _redis_base = _redis_url
else:
    _redis_base = _redis_url
    _redis_db = 0

CACHE_TYPE = "redis"
ACCOUNTS_SESSION_REDIS_URL = _redis_url
CELERY_BROKER_URL = f"{_redis_base}/{_redis_db + 1}"
BROKER_URL = CELERY_BROKER_URL
CELERY_RESULT_BACKEND = f"{_redis_base}/{_redis_db + 2}"
RATELIMIT_STORAGE_URL = f"{_redis_base}/{_redis_db + 3}"
CACHE_REDIS_URL = f"{_redis_base}/{_redis_db + 4}"
COMMUNITIES_IDENTITIES_CACHE_REDIS_URL = CACHE_REDIS_URL

# format celery messages as json for structlog compatibility
CELERY_TASK_SERIALIZER = "json"
CELERY_RESULT_SERIALIZER = "json"
CELERY_ACCEPT_CONTENT = ["json"]

